<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دیباچه هنر — دانشنامه جامع هنر</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-deep: #050d1a;
  --bg-dark: #0a1628;
  --bg-mid: #0f1e38;
  --glass-bg: rgba(15,30,60,0.55);
  --glass-border: rgba(255,255,255,0.08);
  --glass-hover: rgba(255,255,255,0.06);
  --blue-bright: #60a5fa;
  --blue-glow: #2563eb;
  --gold: #f5c842;
  --gold-soft: #e8b84b;
  --text-primary: rgba(255,255,255,0.95);
  --text-secondary: rgba(255,255,255,0.6);
  --text-muted: rgba(255,255,255,0.35);
  --navbar-h: 64px;
}
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: 'Segoe UI', 'Vazirmatn', Tahoma, Arial, sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  direction: rtl;
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}
/* Ambient background */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(37,99,235,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(96,165,250,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 40%, rgba(245,200,66,0.03) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}
.glass {
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-radius: 16px;
}

.app-shell { display: flex; flex-direction: column; min-height: 100vh; position: relative; z-index: 1; }
.app-main { flex: 1; padding-top: var(--navbar-h); }

/* Navbar */
.navbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--navbar-h);
  background: rgba(5,13,26,0.9); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--glass-border); z-index: 100;
}
.navbar-inner {
  max-width: 1280px; margin: 0 auto; height: 100%; display: flex; align-items: center; gap: 24px; padding: 0 24px;
}
.navbar-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; flex-shrink: 0; cursor: pointer; }
.navbar-logo-icon { font-size: 24px; }
.navbar-logo-text { font-size: 1.2rem; font-weight: 800; background: linear-gradient(135deg, #fff 0%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.navbar-links { display: flex; align-items: center; gap: 4px; flex: 1; }
.nav-link { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 10px; text-decoration: none; color: var(--text-secondary); font-size: 0.88rem; font-weight: 500; transition: all 0.2s; white-space: nowrap; cursor: pointer; }
.nav-link:hover { background: var(--glass-hover); color: var(--text-primary); }
.nav-link.active { background: rgba(96,165,250,0.15); color: var(--blue-bright); }

/* Search */
.search-container { position: relative; }
.search-bar {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
  border-radius: 10px; padding: 7px 12px; transition: all 0.2s; max-width: 280px; width: 100%;
}
.search-bar.open { border-color: var(--blue-bright); background: rgba(255,255,255,0.08); }
.search-bar svg { color: var(--text-muted); flex-shrink: 0; width: 16px; height: 16px; }
.search-input {
  flex: 1; background: transparent; border: none; color: var(--text-primary);
  font-family: inherit; font-size: 0.82rem; outline: none; direction: rtl; padding: 0;
}
.search-input::placeholder { color: var(--text-muted); }
.search-clear { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 2px; }
.search-clear:hover { color: var(--text-primary); }
.search-dropdown {
  position: absolute; top: calc(100% + 8px); left: 0; right: 0;
  z-index: 300; max-height: 400px; overflow-y: auto;
  border-radius: 16px; padding: 10px; display: flex; flex-direction: column; gap: 8px;
  min-width: 280px; background: rgba(10,22,40,0.95); border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.search-group { display: flex; flex-direction: column; gap: 4px; }
.search-group-title { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; font-weight: 600; color: var(--text-muted); padding: 4px 6px; text-transform: uppercase; letter-spacing: 0.05em; }
.search-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; background: transparent; border: none; color: var(--text-primary); text-align: right; font-family: inherit; font-size: 0.85rem; transition: all 0.15s; width: 100%; }
.search-item:hover { background: rgba(255,255,255,0.05); }
.search-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.search-avatar { width: 26px; height: 26px; border-radius: 50%; background: rgba(96,165,250,0.15); color: var(--blue-bright); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }
.search-item-name { flex: 1; font-weight: 500; }
.search-item-meta { font-size: 0.72rem; color: var(--text-muted); }
.spinner { width: 24px; height: 24px; border-radius: 50%; border: 3px solid var(--glass-border); border-top-color: var(--blue-bright); animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Hero Video Scroll Section */
.hero-video-section {
  position: relative;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.hero-video-bg {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(37,99,235,0.2) 0%, var(--bg-deep) 100%);
  z-index: 0;
}
.hero-video-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 1;
}
.hero-video-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(5,13,26,0.3) 0%, rgba(5,13,26,0.7) 80%, var(--bg-deep) 100%);
  z-index: 2;
}
.hero-video-content {
  position: absolute;
  top: 120px;
  right: 80px;
  left: auto;
  z-index: 3;

  display: flex;
  flex-direction: column;
  align-items: flex-start;
  text-align: right;

  max-width: 700px;
}

.hero-badge {
  display: inline-block; padding: 6px 16px; border-radius: 20px;
  background: rgba(96,165,250,0.15); border: 1px solid rgba(96,165,250,0.3);
  color: var(--blue-bright); font-size: 0.82rem; font-weight: 600; margin-bottom: 20px;
}
.hero-title {
  font-size: clamp(3.5rem, 7vw, 6rem);
  font-weight: 900;
  margin-bottom: 40px;
  line-height: 1;
}

.hero-title-accent {
  background: linear-gradient(135deg, var(--blue-bright) 0%, #a78bfa 40%, var(--gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-desc {
  font-size: 1.15rem;
  color: var(--text-secondary);
  line-height: 1.8;
  margin-bottom: 36px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}
.hero-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}
.hero-scroll-indicator {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: var(--text-muted);
  font-size: 0.75rem;
  animation: bounceDown 2s infinite;
}
.hero-scroll-indicator svg {
  width: 20px;
  height: 20px;
  animation: bounceDown 2s infinite;
}
@keyframes bounceDown {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(8px); }
}

/* Scroll Text Section */
.scroll-text-section {
  position: relative;
  min-height: 200vh;
  padding: 80px 0;
}
.scroll-text-container {
  position: sticky;
  top: 180px;
  max-width: 900px;
  margin: 0 auto;
  padding: 0 24px;
}

.scroll-text-line{
 font-size: clamp(0.9rem, 1.2vw, 1.1rem);
  line-height: 2;
  max-width: 600px;

  opacity: 0;
  transform: translateY(30px);

  transition: all .8s ease;
  text-align: right;
}

.timeline-wrapper{
  position:relative;
  max-width:1400px;
  margin:auto;
}

.scroll-text-container {
    max-width: 900px !important;
    margin-left: auto !important;
    margin-right: 0 !important;
    padding-left: 0 !important;
}

/* Styles Timeline Page */
  .styles-page { max-width: 1000px; margin: 0 auto; padding: 48px 24px 100px; }
  .styles-header { text-align: center; margin-bottom: 64px; }
  .styles-title { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
  .styles-sub { color: var(--text-secondary); font-size: 0.95rem; }
  .timeline-wrapper { position: relative; }
  .timeline-line {
    position: absolute; left: 50%; top: 0; bottom: 0; width: 2px;
    background: linear-gradient(to bottom, transparent, rgba(79,142,247,0.4) 5%, rgba(79,142,247,0.4) 95%, transparent);
    transform: translateX(-50%);
  }
  .timeline-items { display: flex; flex-direction: column; gap: 40px; }
  .timeline-row { display: grid; grid-template-columns: 1fr 20px 1fr; align-items: center; gap: 0; }
  .timeline-row.left .timeline-card { grid-column: 1; justify-self: end; max-width: 380px; width: 100%; }
  .timeline-row.left .timeline-dot { grid-column: 2; justify-self: center; }
  .timeline-row.left .timeline-spacer { grid-column: 3; }
  .timeline-row.right .timeline-spacer { grid-column: 1; }
  .timeline-row.right .timeline-dot { grid-column: 2; justify-self: center; }
  .timeline-row.right .timeline-card { grid-column: 3; justify-self: start; max-width: 380px; width: 100%; }
  .timeline-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--bg-deep); box-shadow: 0 0 10px currentColor; z-index: 2; position: relative; flex-shrink: 0; }
  .dot-inner { position: absolute; inset: 3px; border-radius: 50%; background: white; opacity: 0.8; }
  .timeline-card {
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px); border-radius: 14px; overflow: hidden;
    cursor: pointer; transition: all 0.25s; text-align: right; display: flex; align-items: center;
  }
  .timeline-card:hover { background: var(--glass-hover); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
  .tc-accent { width: 4px; align-self: stretch; flex-shrink: 0; }
  .tc-body { padding: 14px 16px; flex: 1; }
  .tc-order { font-size: 0.65rem; color: var(--text-muted); font-weight: 700; letter-spacing: 0.1em; margin-bottom: 4px; }
  .tc-name { font-size: 1rem; font-weight: 700; margin-bottom: 2px; }
  .tc-en { font-size: 0.72rem; color: var(--text-muted); direction: ltr; margin-bottom: 4px; }
  .tc-period { font-size: 0.75rem; color: var(--text-secondary); }
  .tc-arrow { color: var(--text-muted); margin-left: 10px; margin-right: 6px; transition: transform 0.2s; flex-shrink: 0; }
  .tc-arrow.open { transform: rotate(-90deg); }


@media (max-width:768px){

  .timeline-card{
    width:140px;
    padding:12px;
  }

  .tc-name{
    font-size:14px;
  }

  .tc-period{
    font-size:11px;
  }

}
/* Buttons */
.btn-primary {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 24px; border-radius: 12px;
  background: linear-gradient(135deg, var(--blue-glow), var(--blue-bright));
  color: white; font-family: inherit; font-size: 0.9rem; font-weight: 600;
  border: none; cursor: pointer; transition: all 0.2s;
  text-decoration: none; box-shadow: 0 4px 20px rgba(37,99,235,0.35);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(37,99,235,0.5); }
.btn-ghost {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 12px 22px; border-radius: 12px;
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  color: var(--text-secondary); font-family: inherit; font-size: 0.9rem; font-weight: 500;
  cursor: pointer; transition: all 0.2s; text-decoration: none;
}
.btn-ghost:hover { background: var(--glass-hover); color: var(--text-primary); }
.w-full { width: 100%; }

/* Stats */
.hero-stats {
  position: relative; z-index: 1; display: flex; gap: 20px; margin-top: 60px;
  flex-wrap: wrap; justify-content: center;
}
.stat-card {
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  padding: 24px 36px; min-width: 130px;
}
.stat-num { font-size: 2rem; font-weight: 800; color: var(--text-primary); line-height: 1; }
.stat-lbl { font-size: 0.8rem; color: var(--text-secondary); }

/* Artists Drawer */
.artists-drawer {
  position: fixed; top: var(--navbar-h); left: 0; bottom: 0; width: 380px; z-index: 200;
  display: flex; flex-direction: column; overflow: hidden;
  border-right: 1px solid var(--glass-border); border-radius: 0;
  background: rgba(5, 15, 35, 0.95); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
  box-shadow: 4px 0 32px rgba(0,0,0,0.5);
}
.drawer-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 20px 16px; border-bottom: 2px solid; flex-shrink: 0; }
.drawer-title-wrap { display: flex; align-items: center; gap: 10px; flex: 1; }
.drawer-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.drawer-title { font-size: 1.3rem; font-weight: 800; line-height: 1.2; margin-bottom: 2px; }
.drawer-period { font-size: 0.75rem; color: var(--text-muted); }
.drawer-close { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-secondary); border-radius: 8px; padding: 7px; cursor: pointer; transition: all 0.2s; display: flex; flex-shrink: 0; }
.drawer-close:hover { background: rgba(239,68,68,0.15); color: #f87171; border-color: rgba(239,68,68,0.3); }
.drawer-desc { padding: 14px 20px; font-size: 0.85rem; color: var(--text-secondary); line-height: 1.8; border-bottom: 1px solid var(--glass-border); flex-shrink: 0; }
.drawer-artists-heading { display: flex; align-items: center; gap: 7px; padding: 12px 20px 8px; font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); flex-shrink: 0; border-bottom: 1px solid var(--glass-border); }
.drawer-artists-list { flex: 1; overflow-y: auto; padding: 8px 10px 20px; display: flex; flex-direction: column; gap: 4px; }
.drawer-artists-list::-webkit-scrollbar { width: 4px; }
.drawer-artists-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
.drawer-artist-row { display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: 10px; text-decoration: none; color: inherit; background: transparent; border: 1px solid transparent; transition: all 0.15s; cursor: pointer; }
.drawer-artist-row:hover { background: rgba(255,255,255,0.05); border-color: var(--glass-border); }
.drawer-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1rem; flex-shrink: 0; }
.drawer-artist-info { flex: 1; min-width: 0; }
.drawer-artist-name { font-size: 0.9rem; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.drawer-artist-sub { font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.drawer-arrow { color: var(--text-muted); flex-shrink: 0; }
.drawer-empty { padding: 30px 20px; text-align: center; color: var(--text-muted); font-size: 0.85rem; }
.drawer-overlay { position: fixed; inset: 0; top: var(--navbar-h); background: rgba(0,0,0,0.4); z-index: 199; display: none; }
.drawer-overlay.show { display: block; }

/* Artist Page */
.artist-page { max-width: 800px; margin: 0 auto; padding: 40px 24px 80px; }
.artist-hero { display: flex; gap: 28px; padding: 28px; margin-bottom: 32px; }
.ah-photo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; }
.ah-initials {
  width: 120px; height: 120px; border-radius: 50%;
  background: linear-gradient(135deg, var(--blue-glow), var(--blue-bright));
  display: flex; align-items: center; justify-content: center;
  font-size: 2.5rem; font-weight: 800; color: white;
}
.ah-info { flex: 1; }
.ah-name { font-size: 1.8rem; font-weight: 800; margin-bottom: 4px; }
.ah-name-en { font-size: 0.95rem; color: var(--text-muted); direction: ltr; margin-bottom: 14px; }
.ah-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.ah-badge { display: flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; background: var(--glass-bg); border: 1px solid var(--glass-border); font-size: 0.8rem; color: var(--text-secondary); }
.ah-bio { font-size: 0.93rem; line-height: 1.9; color: var(--text-secondary); }
.artworks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-top: 16px; }
.artwork-card { overflow: hidden; }
.artwork-img { width: 100%; height: 180px; object-fit: cover; }
.artwork-info { padding: 14px; }
.artwork-title { font-size: 0.92rem; font-weight: 600; margin-bottom: 4px; }
.artwork-year { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; }
.artwork-desc { font-size: 0.8rem; color: var(--text-secondary); line-height: 1.6; }
.artwork-clickable { cursor: zoom-in; transition: opacity 0.2s; }
.artwork-clickable:hover { opacity: 0.9; }
.back-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--text-secondary); text-decoration: none; font-size: 0.88rem; margin-bottom: 24px; transition: color 0.2s; padding: 8px 0; cursor: pointer; }
.back-btn:hover { color: var(--blue-bright); }



 /* Articles Page */
.articles-page { max-width: 1000px; margin: 0 auto; padding: 48px 24px 80px; }
.page-header { text-align: center; margin-bottom: 48px; }
.page-title { font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
.page-sub { color: var(--text-secondary); }
.articles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
.article-card { display: flex; flex-direction: column; text-decoration: none; color: inherit; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
.article-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.3); }
.article-cover { width: 100%; height: 200px; object-fit: cover; }
.article-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
.article-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; line-height: 1.5; }
.article-excerpt { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.7; flex: 1; }
.article-detail-page { max-width: 720px; margin: 0 auto; padding: 40px 24px 80px; }
.ad-cover { width: 100%; max-height: 360px; object-fit: cover; }
.ad-body { padding: 32px; }
.ad-title { font-size: 1.9rem; font-weight: 800; line-height: 1.4; margin-bottom: 16px; }
.ad-date { display: flex; align-items: center; gap: 5px; font-size: 0.8rem; color: var(--text-muted); }
.ad-excerpt { font-size: 1rem; color: var(--text-secondary); line-height: 1.9; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--glass-border); font-weight: 500; }
.ad-content { font-size: 0.95rem; line-height: 2; color: var(--text-secondary); white-space: pre-wrap; }

/* Admin/Management Page */
.management-page { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }
.mgmt-header { margin-bottom: 32px; }
.mgmt-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 20px; }
.mgmt-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.mgmt-tab { display: flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: 10px; background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-secondary); font-family: inherit; font-size: 0.88rem; font-weight: 500; cursor: pointer; transition: all 0.18s; }
.mgmt-tab:hover { background: var(--glass-hover); color: var(--text-primary); }
.mgmt-tab.active { background: rgba(96,165,250,0.15); border-color: rgba(96,165,250,0.4); color: var(--blue-bright); }
.mgmt-section { display: flex; flex-direction: column; gap: 20px; }
.mgmt-form { padding: 22px; display: flex; flex-direction: column; gap: 12px; }
.form-section-title { display: flex; align-items: center; gap: 8px; font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 0.82rem; color: var(--text-secondary); font-weight: 500; }
.form-input {
  width: 100%; padding: 10px 14px; border-radius: 10px;
  background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
  color: var(--text-primary); font-family: inherit; font-size: 0.88rem; outline: none;
  transition: border-color 0.2s; direction: rtl;
}
.form-input:focus { border-color: var(--blue-bright); }
.form-input::placeholder { color: var(--text-muted); }
.form-textarea {
  width: 100%; padding: 10px 14px; border-radius: 10px;
  background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
  color: var(--text-primary); font-family: inherit; font-size: 0.88rem; outline: none;

function initVideoScroll() {
  var canvas = document.getElementById('hero-canvas');
  if (!canvas) return;
  if (!VIDEO_TOTAL_FRAMES) return;
  if (!VIDEO_FRAMES_PATH) return;
  
  var ctx = canvas.getContext('2d');
  var images = [];
  var loaded = 0;
  
  for (var i = 0; i < VIDEO_TOTAL_FRAMES; i++) {
    var img = new Image();
    img.onload = function() {
      loaded++;
      if (loaded === VIDEO_TOTAL_FRAMES) {
        updateFrame();
      }
    };
    var num = i < 10 ? '00' + i : i < 100 ? '0' + i : '' + i;
    img.src = VIDEO_FRAMES_PATH + '/frame_' + num + '.jpg';
    images.push(img);
  }
  
  function updateFrame() {
    var section = document.getElementById('hero-section');
    if (!section) return;
    var rect = section.getBoundingClientRect();
    var sectionHeight = section.offsetHeight;
    var scrollPos = Math.max(0, -rect.top);
    var progress = Math.min(1, Math.max(0, scrollPos / (sectionHeight - window.innerHeight)));
    var frameIndex = Math.floor(progress * (VIDEO_TOTAL_FRAMES - 1));
    
    if (images[frameIndex]) {
      canvas.width = section.offsetWidth;
      canvas.height = section.offsetHeight;
      ctx.drawImage(images[frameIndex], 0, 0, canvas.width, canvas.height);
    }
  }
  
  window.addEventListener('scroll', updateFrame);
  window.addEventListener('resize', updateFrame);
}

// ── Scroll Text Effect ──
function initScrollText() {
  var lines = document.querySelectorAll('.scroll-text-line');
  if (!lines.length) return;
  
  function updateLines() {
    var windowCenter = window.innerHeight / 2;
    
    lines.forEach(function(line) {
      var rect = line.getBoundingClientRect();
      var lineCenter = rect.top + rect.height / 2;
      var distance = Math.abs(lineCenter - windowCenter);
      var maxDistance = window.innerHeight / 1.5;
      var opacity = Math.max(0.08, 1 - (distance / maxDistance));
      var blur = Math.max(0.5, 8 * (distance / maxDistance));
      
      line.style.opacity = opacity;
      line.style.filter = 'blur(' + blur + 'px)';
      line.style.color = opacity > 0.6 ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.4)';
    });
  }
  
  window.addEventListener('scroll', updateLines);
  updateLines();
}

var currentPage = 'home';
var currentParams = {};

function navigate(page, params) {
  currentPage = page;
  currentParams = params || {};
  render();
  window.scrollTo(0, 0);
}
function navigate(page, params) {
  currentPage = page;
  if (params && params.id) {
    currentParams = { id: params.id };
  } else if (params && params.slug) {
    currentParams = { slug: params.slug };
  } else {
    currentParams = {};
  }
  render();
  window.scrollTo(0, 0);
}

function getArtistArtworks(artistId) {
  var result = [];
  for (var i = 0; i < ARTWORKS.length; i++) {
    if (ARTWORKS[i].artistId === artistId) {
      result.push(ARTWORKS[i]);
    }
  }
  return result;
}

function openStyleDrawer(styleId) {
  var style = STYLES.find(function(s) { return s.id === styleId; });
  if (!style) return;
  
  var artists = getStyleArtists(styleId);
  
  var overlay = document.createElement('div');
  overlay.className = 'drawer-overlay show';
  overlay.onclick = function() {
    document.body.removeChild(overlay);
    document.body.removeChild(drawer);
  };
  
  var drawer = document.createElement('div');
  drawer.className = 'artists-drawer slide-in';
  
  var artistsHtml = '';
  if (artists.length > 0) {
    artists.forEach(function(artist) {
        artistsHtml += '<div class="drawer-artist-row" onclick="goToArtist(' + artist.id + ')">';
      artistsHtml += '<div class="drawer-avatar" style="background:' + style.color + '20; color:' + style.color + '">' + artist.name.charAt(0) + '</div>';
      artistsHtml += '<div class="drawer-artist-info">';
      artistsHtml += '<div class="drawer-artist-name">' + artist.name + '</div>';
      artistsHtml += '<div class="drawer-artist-sub">' + artist.nationality + ' · ' + artist.birthYear + '</div>';
      artistsHtml += '</div>';
      artistsHtml += icon('chevronLeft');
      artistsHtml += '</div>';
    });
  } else {
    artistsHtml = '<div class="drawer-empty">هنرمندی در این سبک ثبت نشده</div>';
  }
  
  drawer.innerHTML = '<div class="drawer-header" style="border-bottom-color:' + style.color + '">' +
    '<div class="drawer-title-wrap">' +
    '<div class="drawer-dot" style="background:' + style.color + '"></div>' +
    '<div><div class="drawer-title">' + style.name + '</div>' +
    '<div class="drawer-period">' + style.period + '</div></div>' +
    '</div>' +
    '<button class="drawer-close" onclick="this.closest(\'.artists-drawer\').remove(); document.querySelector(\'.drawer-overlay\').remove();">' + icon('x') + '</button>' +
    '</div>' +
    '<div class="drawer-desc">' + style.description + '</div>' +
    '<div class="drawer-artists-heading">' + icon('users') + '<span>هنرمندان این سبک</span></div>' +
    '<div class="drawer-artists-list">' + artistsHtml + '</div>';
  
  document.body.appendChild(overlay);
  document.body.appendChild(drawer);
}

function openLightbox(artworkId) {
  var artwork = ARTWORKS.find(function(a) { return a.id === artworkId; });
  if (!artwork || !artwork.imageUrl) return;
  
  var lightbox = document.createElement('div');
  lightbox.className = 'lightbox fade-in';
  lightbox.innerHTML = 
    '<div class="lightbox-backdrop" onclick="this.parentElement.remove(); document.body.style.overflow=\'\'"></div>' +
    '<div class="lightbox-toolbar">' +
    '<span class="lightbox-counter">' + artwork.title + '</span>' +
    '<div class="lightbox-tools">' +
    '<button onclick="zoomLightbox(-0.25)">' + icon('zoomOut') + '</button>' +
    '<span class="lightbox-zoom" id="lightbox-zoom">100%</span>' +
    '<button onclick="zoomLightbox(0.25)">' + icon('zoomIn') + '</button>' +
    '</div>' +
    '<button class="lightbox-close" onclick="this.closest(\'.lightbox\').remove(); document.body.style.overflow=\'\'">' + icon('x') + '</button>' +
    '</div>' +
    '<div class="lightbox-stage" id="lightbox-stage">' +
    '<img src="' + artwork.imageUrl + '" alt="' + artwork.title + '" class="lightbox-img" id="lightbox-img" style="transform: scale(1)">' +
    '</div>' +
    '<div class="lightbox-caption">' +
    '<h3 class="lightbox-title">' + artwork.title + '</h3>' +
    (artwork.year ? '<span class="lightbox-year">' + artwork.year + '</span>' : '') +
    (artwork.description ? '<p class="lightbox-desc">' + artwork.description + '</p>' : '') +
    '</div>';
  
  document.body.appendChild(lightbox);
  document.body.style.overflow = 'hidden';
  
  var currentZoom = 1;
  window.zoomLightbox = function(delta) {
    currentZoom = Math.max(1, Math.min(4, currentZoom + delta));
    var img = document.getElementById('lightbox-img');
    if (img) img.style.transform = 'scale(' + currentZoom + ')';
    var zoomEl = document.getElementById('lightbox-zoom');
    if (zoomEl) zoomEl.textContent = Math.round(currentZoom * 100) + '%';
  };
  
  // Close with Escape
  var escHandler = function(e) {
    if (e.key === 'Escape') {
      lightbox.remove();
      document.body.style.overflow = '';
      document.removeEventListener('keydown', escHandler);
    }
  };
  document.addEventListener('keydown', escHandler);
}
// ── Management Page ──
var mgmtTab = 'artists';

function renderManagement() {
  var html = '';
  
  html += '<div class="management-page page">';
  html += '<div class="mgmt-header">';
  html += '<h1 class="mgmt-title">مدیریت محتوا</h1>';
  html += '<div class="mgmt-tabs">';
  
  var tabs = [
    { id: 'artists', label: 'هنرمندان', icon: 'users' },
    { id: 'artworks', label: 'آثار', icon: 'image' },
    { id: 'styles', label: 'سبک‌ها', icon: 'palette' },
    { id: 'articles', label: 'مقالات', icon: 'book' }
  ];
  
  tabs.forEach(function(tab) {
    html += '<button class="mgmt-tab' + (mgmtTab === tab.id ? ' active' : '') + '" onclick="switchMgmtTab(\'' + tab.id + '\')">';
    html += icon(tab.icon);
    html += '<span>' + tab.label + '</span>';
    html += '</button>';
  });
  
  html += '</div>';
  html += '</div>';
  html += '<div class="mgmt-section" id="mgmt-content"></div>';
  html += '</div>';
  
  setTimeout(function() { renderMgmtContent(); }, 10);
  
  return html;
}

function switchMgmtTab(tab) {
  mgmtTab = tab;
  render();
}

function renderMgmtContent() {
  var container = document.getElementById('mgmt-content');
  if (!container) return;
  
  if (mgmtTab === 'artists') {
    container.innerHTML = renderArtistsMgmt();
  } else if (mgmtTab === 'artworks') {
    container.innerHTML = renderArtworksMgmt();
  } else if (mgmtTab === 'styles') {
    container.innerHTML = renderStylesMgmt();
  } else if (mgmtTab === 'articles') {
    container.innerHTML = renderArticlesMgmt();
  }
}

// ── Articles Management ──

function addArticle() {
  var title = document.getElementById('article-title').value.trim();
  var slug = document.getElementById('article-slug').value.trim();

  if (!title || !content) return alert('عنوان و متن مقاله الزامی است');
  if (!slug) slug = title.replace(/\s+/g, '-');
  
  var newArticle = {
    id: ARTICLES.length > 0 ? Math.max.apply(null, ARTICLES.map(function(a) { return a.id; })) + 1 : 1,
    title: title,
    slug: slug,
    excerpt: document.getElementById('article-excerpt').value.trim(),
    content: content,
    coverUrl: document.getElementById('article-cover').value.trim(),
    published: document.getElementById('article-published').checked,
    createdAt: new Date().toISOString().slice(0, 10)
  };
  
  ARTICLES.push(newArticle);
  saveData();
  render();
}

function deleteArticle(id) {
  if (!confirm('آیا از حذف این مقاله مطمئن هستید؟')) return;
  var index = ARTICLES.findIndex(function(a) { return a.id === id; });
  if (index > -1) ARTICLES.splice(index, 1);
  saveData();
  render();
}

    if (ARTISTS[i].styleId === styleId) {
      result.push(ARTISTS[i]);

}

// ── Save/Load Data ──
function saveData() {
  try {
    localStorage.setItem('dibache_artists', JSON.stringify(ARTISTS));
    localStorage.setItem('dibache_artworks', JSON.stringify(ARTWORKS));
    localStorage.setItem('dibache_articles', JSON.stringify(ARTICLES));
    localStorage.setItem('dibache_styles', JSON.stringify(STYLES));
  } catch(e) {
    console.log('Could not save to localStorage');
  }
}

function loadData() {
  try {
    var savedArtists = localStorage.getItem('dibache_artists');
    var savedArtworks = localStorage.getItem('dibache_artworks');
    var savedArticles = localStorage.getItem('dibache_articles');
    var savedStyles = localStorage.getItem('dibache_styles');
    
    if (savedArtists && JSON.parse(savedArtists).length > 0) {
      ARTISTS.length = 0;
      JSON.parse(savedArtists).forEach(function(a) { ARTISTS.push(a); });
    }
    if (savedArtworks && JSON.parse(savedArtworks).length > 0) {
      ARTWORKS.length = 0;
      JSON.parse(savedArtworks).forEach(function(a) { ARTWORKS.push(a); });
    }
    if (savedArticles && JSON.parse(savedArticles).length > 0) {
      ARTICLES.length = 0;
      JSON.parse(savedArticles).forEach(function(a) { ARTICLES.push(a); });
    }
    if (savedStyles && JSON.parse(savedStyles).length > 0) {
      STYLES.length = 0;
      JSON.parse(savedStyles).forEach(function(s) { STYLES.push(s); });
    }
  } catch(e) {
    console.log('Could not load from localStorage');
  }
}

// ── Search ──
function initSearch() {
  var container = document.getElementById('search-container');
  if (!container) return;
  
  var html = '';
  html += '<div class="search-container" id="search-wrapper">';
  html += '<div class="search-bar">';
  html += icon('search');
  html += '<input type="text" placeholder="جستجو..." class="search-input" id="search-input" onfocus="showSearchResults()" oninput="updateSearch()">';
  html += '<button class="search-clear" id="search-clear" style="display:none" onclick="clearSearch()">' + icon('x') + '</button>';
  html += '</div>';
  html += '<div class="search-dropdown" id="search-dropdown" style="display:none"></div>';
  html += '</div>';
  
  container.innerHTML = html;
}

function showSearchResults() {
  var dropdown = document.getElementById('search-dropdown');
  if (dropdown) dropdown.style.display = 'block';
}

function hideSearchResults() {
  setTimeout(function() {
    var dropdown = document.getElementById('search-dropdown');
    if (dropdown) dropdown.style.display = 'none';
  }, 200);
}

function updateSearch() {
  var input = document.getElementById('search-input');
  var dropdown = document.getElementById('search-dropdown');
  var clearBtn = document.getElementById('search-clear');
  var q = input.value.trim();
  
  if (clearBtn) clearBtn.style.display = q ? 'block' : 'none';
  
  if (q.length < 2) {
    if (dropdown) dropdown.style.display = 'none';
    return;
  }
  
  var results = searchData(q);
  var total = results.styles.length + results.artists.length;
  
  if (total === 0) {
    if (dropdown) {
      dropdown.style.display = 'block';
      dropdown.innerHTML = '<p style="text-align:center;padding:20px;color:rgba(255,255,255,0.4);">نتیجه‌ای یافت نشد</p>';
    }
    return;
  }
  
  var html = '';
  
  if (results.styles.length > 0) {
    html += '<div class="search-group">';
    html += '<div class="search-group-title">' + icon('palette') + ' سبک‌ها</div>';
    results.styles.forEach(function(s) {
      html += '<div class="search-item" onmousedown="navigate(\'styles\'); hideSearchResults();">';
      html += '<span class="search-dot" style="background:' + s.color + '"></span>';
      html += '<span class="search-item-name">' + s.name + '</span>';
      html += '<span class="search-item-meta">' + s.period + '</span>';
      html += '</div>';
    });
    html += '</div>';
  }
  
  if (results.artists.length > 0) {
    html += '<div class="search-group">';
    html += '<div class="search-group-title">' + icon('users') + ' هنرمندان</div>';
    results.artists.forEach(function(a) {
      html += '<div class="search-item" onmousedown="navigate(\'artist\', {id:' + a.id + '}); hideSearchResults();">';
      html += '<span class="search-avatar">' + a.name.charAt(0) + '</span>';
      html += '<span class="search-item-name">' + a.name + '</span>';
      html += '<span class="search-item-meta">' + a.nationality + '</span>';
      html += '</div>';
    });
    html += '</div>';
  }
  
  if (dropdown) {
    dropdown.innerHTML = html;
    dropdown.style.display = 'block';
  }
}

function clearSearch() {
  var input = document.getElementById('search-input');
  var clearBtn = document.getElementById('search-clear');
  var dropdown = document.getElementById('search-dropdown');
  if (input) input.value = '';
  if (clearBtn) clearBtn.style.display = 'none';
  if (dropdown) dropdown.style.display = 'none';
}

document.addEventListener('click', function(e) {
  var wrapper = document.getElementById('search-wrapper');
  if (wrapper && !wrapper.contains(e.target)) {
    var dropdown = document.getElementById('search-dropdown');
    if (dropdown) dropdown.style.display = 'none';
  }
});

loadData();
render();
</script>
